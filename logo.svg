<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="tab1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="tab2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="tab3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Scattered tabs (before) on left side -->
  <!-- Tab 1 - pink, tilted -->
  <g transform="translate(80, 120) rotate(-12)">
    <rect x="0" y="0" width="100" height="70" rx="10" fill="url(#tab1)" opacity="0.5"/>
    <rect x="8" y="20" width="50" height="6" rx="3" fill="white" opacity="0.5"/>
    <rect x="8" y="32" width="35" height="6" rx="3" fill="white" opacity="0.3"/>
  </g>

  <!-- Tab 2 - green, tilted other way -->
  <g transform="translate(60, 210) rotate(8)">
    <rect x="0" y="0" width="100" height="70" rx="10" fill="url(#tab2)" opacity="0.5"/>
    <rect x="8" y="20" width="50" height="6" rx="3" fill="white" opacity="0.5"/>
    <rect x="8" y="32" width="35" height="6" rx="3" fill="white" opacity="0.3"/>
  </g>

  <!-- Tab 3 - blue, tilted -->
  <g transform="translate(90, 300) rotate(-5)">
    <rect x="0" y="0" width="100" height="70" rx="10" fill="url(#tab3)" opacity="0.5"/>
    <rect x="8" y="20" width="50" height="6" rx="3" fill="white" opacity="0.5"/>
    <rect x="8" y="32" width="35" height="6" rx="3" fill="white" opacity="0.3"/>
  </g>

  <!-- Arrow in the middle -->
  <g transform="translate(220, 230)">
    <path d="M0,15 L50,15 L50,0 L80,25 L50,50 L50,35 L0,35 Z" fill="white" opacity="0.9"/>
  </g>

  <!-- Grouped/stacked tabs on right side -->
  <!-- Pink group -->
  <g transform="translate(310, 110)">
    <rect x="0" y="0" width="130" height="50" rx="10" fill="url(#tab1)" opacity="0.9"/>
    <rect x="10" y="14" width="55" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="10" y="26" width="40" height="6" rx="3" fill="white" opacity="0.4"/>
    <!-- Stacked effect -->
    <rect x="4" y="-4" width="130" height="50" rx="10" fill="url(#tab1)" opacity="0.3" style="pointer-events:none"/>
  </g>

  <!-- Green group -->
  <g transform="translate(310, 210)">
    <rect x="0" y="0" width="130" height="50" rx="10" fill="url(#tab2)" opacity="0.9"/>
    <rect x="10" y="14" width="55" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="10" y="26" width="40" height="6" rx="3" fill="white" opacity="0.4"/>
    <rect x="4" y="-4" width="130" height="50" rx="10" fill="url(#tab2)" opacity="0.3" style="pointer-events:none"/>
  </g>

  <!-- Blue group -->
  <g transform="translate(310, 310)">
    <rect x="0" y="0" width="130" height="50" rx="10" fill="url(#tab3)" opacity="0.9"/>
    <rect x="10" y="14" width="55" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="10" y="26" width="40" height="6" rx="3" fill="white" opacity="0.4"/>
    <rect x="4" y="-4" width="130" height="50" rx="10" fill="url(#tab3)" opacity="0.3" style="pointer-events:none"/>
  </g>

  <!-- AI sparkle / star -->
  <g transform="translate(370, 385)">
    <path d="M30,0 L36,20 L56,20 L40,32 L46,52 L30,40 L14,52 L20,32 L4,20 L24,20 Z" fill="url(#spark)" opacity="0.95"/>
  </g>
  <g transform="translate(80, 80) scale(0.5)">
    <path d="M30,0 L36,20 L56,20 L40,32 L46,52 L30,40 L14,52 L20,32 L4,20 L24,20 Z" fill="url(#spark)" opacity="0.7"/>
  </g>
</svg>
